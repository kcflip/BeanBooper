<!DOCTYPE html>

  <title>Collage</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1e1510;
      overflow: hidden;
    }

    @keyframes wiggle {
      0%   { transform: rotate(var(--r)) scale(1.05); }
      25%  { transform: rotate(calc(var(--r) + 4deg)) scale(1.05); }
      50%  { transform: rotate(calc(var(--r) - 3deg)) scale(1.05); }
      75%  { transform: rotate(calc(var(--r) + 2deg)) scale(1.05); }
      100% { transform: rotate(var(--r)) scale(1.05); }
    }

    .photo {
      position: absolute;
      transform: rotate(var(--r));
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .photo:hover:not(.dragging) {
      animation: wiggle 0.45s ease-in-out infinite;
    }

    .photo.dragging {
      cursor: grabbing;
      animation: none !important;
      transform: rotate(var(--r)) scale(1.06);
    }

    .photo img {
      display: block;
      width: 200px;
      height: auto;
      pointer-events: none;
    }
  </style>
</head>

  <script>
    let topZ = 10;

    document.querySelectorAll('.photo').forEach(photo => {
      let dragging = false;
      let startX, startY, startLeft, startTop;

      photo.addEventListener('mousedown', e => {
        dragging = true;
        photo.classList.add('dragging');
        photo.style.zIndex = ++topZ;
        startX = e.clientX;
        startY = e.clientY;
        startLeft = photo.offsetLeft;
        startTop = photo.offsetTop;
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        photo.style.left = (startLeft + e.clientX - startX) + 'px';
        photo.style.top  = (startTop  + e.clientY - startY) + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        photo.classList.remove('dragging');
      });
    });
  </script>
